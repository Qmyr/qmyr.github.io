name: Daily Fetch Config from Gitee (or Manual)
on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:
jobs:
  fetch-config:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2
        with:
          ref: qmyr.github.io
          fetch-depth: 0
      - name: Fetch config from Gitee
        run: |
          CURL_USER_AGENT='Mozilla/5.0 (Windows NT 6.1; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/96.0.4664.110 Safari/537.36'
          curl -s -H "User-Agent: $CURL_USER_AGENT" -o AppSource/TVBox/Source/Config.json "https://gitee.com/Qmyr/Qmyr/raw/master/Source/Config.json"
          if [ ! -f "AppSource/TVBox/Source/Config.json" ]; then
            echo "Failed to download Config.json"
            exit 1
          fi
      - name: Commit and push changes
        run: |
          git config --local user.email "your-email@example.com"
          git config --local user.name "Qmyr"
          git add AppSource/TVBox/Source/Config.json
          if [ -n "$(git diff --cached --quiet)" ]; then
            git commit -m "Daily update of Config.json from Gitee"
            git push origin qmyr.github.io
          else
            echo "No changes to commit"
          fi
        env:  
